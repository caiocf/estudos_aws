<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Arquitetura VPC Flow Logs para OpenSearch</title>
  <desc id="desc">Diagrama da arquitetura mostrando a default VPC, VPC Flow Log, CloudWatch Log Group, subscription filter, Lambda, OpenSearch e Dashboards.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#e5eef0"/>
    </linearGradient>
    <linearGradient id="header" x1="0" x2="1">
      <stop offset="0%" stop-color="#173142"/>
      <stop offset="100%" stop-color="#29586f"/>
    </linearGradient>
    <linearGradient id="colA" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecf4eb"/>
      <stop offset="100%" stop-color="#dbeada"/>
    </linearGradient>
    <linearGradient id="colB" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#edf2fa"/>
      <stop offset="100%" stop-color="#dde7f6"/>
    </linearGradient>
    <linearGradient id="colC" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8f0e8"/>
      <stop offset="100%" stop-color="#f2e1cf"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fffdfa"/>
      <stop offset="100%" stop-color="#f8f5ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#3a4b4a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#577282"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 18px 'Segoe UI', Arial, sans-serif; fill: #dce9ef; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #24352d; }
      .cardTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #213229; }
      .cardText { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #44564d; }
      .cardMono { font: 700 16px Consolas, 'Courier New', monospace; fill: #25495e; }
      .label { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #49606c; }
      .small { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #55635b; }
      .note { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #6c4d12; }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#page)"/>
  <rect x="34" y="28" width="1332" height="764" rx="30" fill="#fffdf8" stroke="#d7d0c4" stroke-width="2"/>

  <rect x="34" y="28" width="1332" height="108" rx="30" fill="url(#header)"/>
  <text x="76" y="78" class="title">Arquitetura do laboratorio</text>
  <text x="76" y="109" class="subtitle">Default VPC -> VPC Flow Logs -> CloudWatch Logs -> Lambda -> OpenSearch -> Dashboards</text>

  <rect x="74" y="172" width="386" height="530" rx="28" fill="url(#colA)" stroke="#b5cbb2" stroke-width="2"/>
  <rect x="506" y="172" width="386" height="530" rx="28" fill="url(#colB)" stroke="#bac9df" stroke-width="2"/>
  <rect x="938" y="172" width="386" height="530" rx="28" fill="url(#colC)" stroke="#d7c1aa" stroke-width="2"/>

  <text x="104" y="214" class="section">1. Ingestao</text>
  <text x="536" y="214" class="section">2. Processamento</text>
  <text x="968" y="214" class="section">3. Consulta</text>

  <g filter="url(#shadow)">
    <rect x="102" y="250" width="330" height="138" rx="24" fill="url(#card)" stroke="#cad7c8" stroke-width="2"/>
    <text x="132" y="293" class="cardTitle">Default VPC</text>
    <text x="132" y="325" class="cardText">Interfaces de rede geram trafego</text>
    <text x="132" y="353" class="cardText">que sera capturado pelo Flow Log.</text>
    <text x="132" y="378" class="cardMono">aws_vpc.default</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="102" y="430" width="330" height="148" rx="24" fill="url(#card)" stroke="#cad7c8" stroke-width="2"/>
    <text x="132" y="473" class="cardTitle">VPC Flow Log</text>
    <text x="132" y="505" class="cardText">Captura ACCEPT, REJECT ou ALL</text>
    <text x="132" y="533" class="cardText">com agregacao configuravel.</text>
    <text x="132" y="558" class="cardMono">aws_flow_log.default_vpc</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="534" y="250" width="330" height="148" rx="24" fill="url(#card)" stroke="#c7d2e6" stroke-width="2"/>
    <text x="564" y="293" class="cardTitle">CloudWatch Log Group</text>
    <text x="564" y="325" class="cardText">Recebe os registros do Flow Log.</text>
    <text x="564" y="353" class="cardText">Os log streams sao criados pela AWS.</text>
    <text x="564" y="378" class="cardMono">/aws/vpc/flow-logs/&lt;domain_name&gt;</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="534" y="432" width="330" height="146" rx="24" fill="url(#card)" stroke="#c7d2e6" stroke-width="2"/>
    <text x="564" y="475" class="cardTitle">Subscription Filter</text>
    <text x="564" y="507" class="cardText">Encaminha eventos do log group</text>
    <text x="564" y="535" class="cardText">para a Lambda de ingestao.</text>
    <text x="564" y="560" class="cardMono">aws_cloudwatch_log_subscription_filter</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="966" y="232" width="330" height="146" rx="24" fill="url(#card)" stroke="#dec8b1" stroke-width="2"/>
    <text x="996" y="275" class="cardTitle">Lambda</text>
    <text x="996" y="307" class="cardText">Descompacta o evento do CloudWatch,</text>
    <text x="996" y="335" class="cardText">transforma em JSON e envia via bulk.</text>
    <text x="996" y="360" class="cardMono">flow-logs-to-opensearch</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="966" y="418" width="330" height="146" rx="24" fill="url(#card)" stroke="#dec8b1" stroke-width="2"/>
    <text x="996" y="461" class="cardTitle">OpenSearch Domain</text>
    <text x="996" y="493" class="cardText">Indices diarios com prefixo</text>
    <text x="996" y="521" class="cardMono">vpc-flow-logs-YYYY.MM.DD</text>
    <text x="996" y="548" class="cardText">recebem os documentos indexados.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="966" y="604" width="330" height="72" rx="22" fill="url(#card)" stroke="#dec8b1" stroke-width="2"/>
    <text x="996" y="648" class="cardTitle">Dashboards / Discover</text>
  </g>

  <line x1="267" y1="390" x2="267" y2="430" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="432" y1="502" x2="534" y2="324" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="699" y1="400" x2="699" y2="432" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="864" y1="505" x2="966" y2="305" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="1131" y1="378" x2="1131" y2="418" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="1131" y1="564" x2="1131" y2="604" stroke="#577282" stroke-width="6" marker-end="url(#arrow)"/>

  <text x="336" y="442" class="label">captura trafego</text>
  <text x="455" y="452" class="label">publica logs</text>
  <text x="720" y="420" class="label">assina eventos</text>
  <text x="888" y="414" class="label">invoca</text>
  <text x="1150" y="398" class="label">bulk API</text>
  <text x="1152" y="584" class="label">consulta</text>

  <rect x="104" y="720" width="1192" height="44" rx="14" fill="#fff3cf" stroke="#d2b04d" stroke-width="2"/>
  <text x="126" y="748" class="note">Nota: a assinatura do CloudWatch Logs acontece no log group. Os log streams sao automaticos e nao precisam ser configurados manualmente.</text>
</svg>
